help_page:
  button: "How it works?"
  modal:
    title: "🍽️ Food Assistant — How it works"
    select_title: "📚 Choose a topic:"
    steps:
      - title: "🔍 About the app"
        text: |
          <div style="max-width: 600px; margin: 0 auto; line-height: 1.8; hyphens: auto; overflow-wrap: break-word;">
            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 25px; border-radius: 10px; margin-bottom: 25px; text-align: center;">
              <p style="font-size: 22px; font-weight: bold; margin: 0 0 10px 0; color: white;">🍽️ Welcome to Food Assistant!</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 15px;"><strong>Our system helps you:</strong></p>
              <p style="font-size: 15px; margin-bottom: 10px; padding-left: 10px; border-left: 3px solid #667eea;">Lose weight ⬇️, gain muscle mass 💪, or maintain your current weight ⚖️. You set the goal — the assistant helps you achieve it.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📸 Just snap a photo</strong></p>
              <p style="font-size: 15px; margin-bottom: 10px; padding-left: 10px; border-left: 3px solid #667eea;">Upload it to the system — the ML model automatically identifies ingredients and calculates calories 🔥, protein, fats, and carbs 📊.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>✨ Personalized recommendations</strong></p>
              <p style="font-size: 15px; margin-bottom: 10px; padding-left: 10px; border-left: 3px solid #667eea;">Get progress tracking 📈 and complete nutrition statistics — all in one place, no manual data entry 💾.</p>
            </div>
            <div style="background: rgba(255, 107, 107, 0.1); padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid #FF6B6B;">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📝 Forget the complexity</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #FF6B6B;">Forget complicated spreadsheets and manual macro calculations. Achieve results faster 🚀 with a smart assistant that's always at hand 📱.</p>
            </div>
            <div style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); padding: 25px; border-radius: 10px; margin-bottom: 20px; text-align: center;">
              <p style="font-size: 18px; font-weight: bold; margin: 0 0 10px 0; color: white;">🌟 Start your journey to healthy eating today!</p>
            </div>
            <div style="background: rgba(76, 175, 80, 0.1); padding: 20px; border-radius: 10px; border-left: 4px solid #4CAF50; text-align: center;">
              <p style="font-size: 16px; margin: 0;"><em>💡 Create an account to get started — it takes less than a minute.</em><br><br><strong>👉 Go to «👤 Create Profile» tab</strong></p>
            </div>
          </div>
      - title: "👤 Create Profile"
        text: |
          <div style="max-width: 600px; margin: 0 auto; line-height: 1.8; hyphens: auto; overflow-wrap: break-word;">
            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 10px; margin-bottom: 25px; text-align: center;">
              <p style="font-size: 20px; font-weight: bold; margin: 0 0 10px 0; color: white;">🚀 Want to join?</p>
              <p style="font-size: 16px; margin: 0; color: #f0f0f0;"><em>It's simple! Click "Sign Up" on the "Login" page or in the sidebar navigation.</em></p>
            </div>
            <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 25px;">
              <p style="font-size: 16px; margin: 0;"><strong>The registration form is divided into two sections: "Login Details" and "About You".</strong> 👋 <em>It takes less than a minute!</em></p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 17px; margin-bottom: 8px;"><strong>🔐 Login Details</strong></p>
              <p style="font-size: 15px; margin-bottom: 15px; padding-left: 10px; border-left: 3px solid #667eea;"><strong>Username</strong> — choose a unique login for your account.<br><strong>Password</strong> — create a strong password (at least 6 characters) and confirm it.</p>
              <p style="font-size: 17px; margin-bottom: 8px;"><strong>🎯 Goal</strong></p>
              <p style="font-size: 15px; margin-bottom: 15px; padding-left: 10px; border-left: 3px solid #667eea;">What do you want to achieve? Lose weight ⬇️, gain muscle mass 💪, or maintain your current shape ⚖️? The assistant will adapt to your goal!</p>
              <p style="font-size: 17px; margin-bottom: 8px;"><strong>👤 Gender</strong></p>
              <p style="font-size: 15px; margin-bottom: 15px; padding-left: 10px; border-left: 3px solid #667eea;">Specify your gender for a more accurate calorie calculation. You can also select "Prefer not to say".</p>
              <p style="font-size: 17px; margin-bottom: 8px;"><strong>🏃 Activity Level</strong></p>
              <div style="border-left: 3px solid #667eea; padding-left: 15px; margin-bottom: 15px;">
                <p style="font-size: 15px; margin: 0 0 12px 0; font-weight: bold;">How would you like to specify your activity?</p>
                <div style="margin-left: 10px; border-left: 2px solid rgba(102, 126, 234, 0.6); padding-left: 12px; margin-bottom: 10px;">
                    <p style="font-size: 14px; margin: 0; line-height: 1.5;">✍️ <strong>Describe your lifestyle</strong> — describe your daily routine in your own words (e.g., "night shift work, 2 hours of walking daily"), and the AI assistant will automatically calculate your activity coefficient.</p>
                </div>
                <div style="margin-left: 10px; border-left: 2px solid rgba(102, 126, 234, 0.6); padding-left: 12px;">
                    <p style="font-size: 14px; margin: 0; line-height: 1.5;">📋 <strong>Choose from presets</strong> — select the most suitable activity level from the list (sedentary, light activity, moderate, etc.).</p>
                </div>
              </div>
              <p style="font-size: 17px; margin-bottom: 8px;"><strong>🎂 Age</strong></p>
              <p style="font-size: 15px; margin-bottom: 15px; padding-left: 10px; border-left: 3px solid #667eea;">Helps understand how your metabolism works. It changes over time, and the assistant takes this into account.</p>
              <p style="font-size: 17px; margin-bottom: 8px;"><strong>⚖️ Weight</strong></p>
              <p style="font-size: 15px; margin-bottom: 15px; padding-left: 10px; border-left: 3px solid #667eea;">Your current weight in kilograms. This is the foundation for calculating your daily macros and tracking your progress.</p>
              <p style="font-size: 17px; margin-bottom: 8px;"><strong>📏 Height</strong></p>
              <p style="font-size: 15px; margin-bottom: 15px; padding-left: 10px; border-left: 3px solid #667eea;">Your height in centimeters. Combined with your weight and age, it helps precisely calculate how many calories you actually need.</p>
            </div>
            <div style="background: rgba(76, 175, 80, 0.1); padding: 20px; border-radius: 10px; border-left: 4px solid #4CAF50;">
              <p style="font-size: 15px; margin: 0;"><em>💡 All your data is confidential!</em><br><br><em>🔧 All parameters, except for username and password, can be changed at any time in settings.</em><br><br><em>🔧 When describing your lifestyle in your own words, the assistant will automatically select the optimal activity coefficient — no need to deal with numbers!</em></p>
            </div>
          </div>
      - title: "🏠 Home Page"
        text: |
          <div style="max-width: 600px; margin: 0 auto; line-height: 1.8; hyphens: auto; overflow-wrap: break-word;">
            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 25px; border-radius: 10px; margin-bottom: 25px; text-align: center;">
              <p style="font-size: 22px; font-weight: bold; margin: 0 0 10px 0; color: white;">👋 Hello! You're on the home page</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📊 Circular Indicators</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">The indicators will show how many calories, proteins, fats, and carbohydrates you've consumed so far, and how much is left to reach your daily goal.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📝 Food Diary</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">This diary allows you to edit, add, and modify entries for any day.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📸 Add a Dish</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Upload a photo of your meal — the ML model will recognize the ingredients and automatically calculate calories, proteins, fats, and carbs. You can add, remove, or modify each ingredient before saving.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📈 General Statistics</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Analyze your progress over a week or month: weight trends, calorie intake, and consumption of proteins, fats, and carbohydrates.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>⚙️ Settings</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Update your personal data: age, weight, height, goal, and activity level. All parameters except username and password can be changed at any time.</p>
            </div>
          </div>
      - title: "📸 Add a dish"
        text: |
          <div style="max-width: 600px; margin: 0 auto; line-height: 1.8; hyphens: auto; overflow-wrap: break-word;">
            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 25px; border-radius: 10px; margin-bottom: 25px; text-align: center;">
              <p style="font-size: 20px; font-weight: bold; margin: 0 0 10px 0; color: white;">🚀 Want to add a meal?</p>
              <p style="font-size: 16px; margin: 0; color: #f0f0f0;"><em>Click "Add a Dish" on the home page or in the sidebar navigation.</em></p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>🍽️ Photo Recognition</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Upload a photo of your meal — the system will automatically recognize the ingredients and calculate calories, proteins, fats, and carbs.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📤 Photo Upload</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Upload a photo by dragging and dropping or using the "Browse Files" button. Supported formats: JPG, JPEG, PNG (max 3 MB).</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>✏️ Description (optional)</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Add a text description of your dish (up to 250 characters) — this will help the system recognize ingredients more accurately.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📊 Ingredients Table</strong></p>
              <p style="font-size: 15px; margin-bottom: 10px; padding-left: 10px; border-left: 3px solid #667eea;"><strong>Ingredient</strong> — product name.<br>
              <strong>Weight (g)</strong> — ingredient weight in grams.<br>
              <strong>Calories (kcal)</strong> — caloric content.<br>
              <strong>Proteins (g)</strong> — protein content.<br>
              <strong>Fats (g)</strong> — fat content.<br>
              <strong>Carbohydrates (g)</strong> — carbohydrate content.</p>
              <p style="font-size: 14px; margin: 10px 0 0 10px; padding: 10px; background: rgba(255, 193, 7, 0.1); border-left: 3px solid #FFC107; border-radius: 4px;">
                <strong>💡 Note:</strong> if an ingredient name starts with <strong>~</strong> (tilde), it means the values are approximate. Be careful when reviewing such entries in your food diary.
              </p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>✋ Editing</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Check the recognition results. You can add new ingredients, remove unnecessary ones, or adjust the weight of each product before saving.</p>
            </div>
            <div style="background: rgba(76, 175, 80, 0.1); padding: 20px; border-radius: 10px; border-left: 4px solid #4CAF50; text-align: center;">
              <p style="font-size: 16px; margin: 0;"><em>💡 Tip: take photos in good lighting to improve recognition accuracy!</em></p>
            </div>
          </div>
      - title: "📝 Food Diary"
        text: |
          <div style="max-width: 600px; margin: 0 auto; line-height: 1.8; hyphens: auto; overflow-wrap: break-word;">
            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 25px; border-radius: 10px; margin-bottom: 25px; text-align: center;">
              <p style="font-size: 20px; font-weight: bold; margin: 0 0 10px 0; color: white;">📋 Meal Management</p>
              <p style="font-size: 16px; margin: 0; color: #f0f0f0;"><em>Click "Food Diary" on the home page or in the sidebar navigation.</em></p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📅 Date Selection</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">View and edit your records for any day. Use the calendar to select the desired date.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📊 Ingredients Table</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">All ingredients for the selected day are displayed in a table with detailed information: weight, calories, proteins, fats, and carbohydrates.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>✏️ Editing</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Adjust ingredient weights, remove extra items, or add new foods. All changes apply to the selected date.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📈 Daily Summary</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">At the bottom of the page, daily totals are displayed: total weight, calories, proteins, fats, and carbohydrates.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>💾 Saving Changes</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">After editing, click "Save Changes" to update the data in your food diary.</p>
            </div>
          </div>
      - title: "📈 Statistics"
        text: |
          <div style="max-width: 600px; margin: 0 auto; line-height: 1.8; hyphens: auto; overflow-wrap: break-word;">
            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 25px; border-radius: 10px; margin-bottom: 25px; text-align: center;">
              <p style="font-size: 20px; font-weight: bold; margin: 0 0 10px 0; color: white;">📊 Progress Analysis</p>
              <p style="font-size: 16px; margin: 0; color: #f0f0f0;"><em>Click "General statistics" on the home page or in the sidebar navigation.</em></p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📅 Period Selection</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Select a date range for analysis. Statistics will be displayed for the entire selected period.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📉 Weight Trends</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">A bar chart shows your weight changes over the selected period. Track your weight progress.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📊 Chart Legend</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">On all comparison charts (calories, proteins, fats, carbohydrates): <strong>red line</strong> — your daily goal, <strong>bars</strong> — actual consumption.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>🔥 Calories vs Goal</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Compare your actual calorie intake with your daily goal. Helps control calorie deficit or surplus.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>💪 Proteins vs Goal</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Track your protein intake relative to your goal. Important for maintaining muscle mass.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>🥑 Fats vs Goal</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Monitor your fat intake relative to your daily goal. Important for hormonal health.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>🍞 Carbohydrates vs Goal</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Track your carbohydrate intake relative to your goal. Carbohydrates are the body's main source of energy, especially important during physical activity.</p>
            </div>
            <div style="background: rgba(76, 175, 80, 0.1); padding: 20px; border-radius: 10px; border-left: 4px solid #4CAF50; text-align: center;">
              <p style="font-size: 16px; margin: 0;"><em>💡 Tip: check your statistics weekly to evaluate progress and adjust your goals!</em></p>
            </div>
          </div>
      - title: "⚙️ Settings"
        text: |
          <div style="max-width: 600px; margin: 0 auto; line-height: 1.8; hyphens: auto; overflow-wrap: break-word;">
            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 25px; border-radius: 10px; margin-bottom: 25px; text-align: center;">
              <p style="font-size: 20px; font-weight: bold; margin: 0 0 10px 0; color: white;">🔧 Profile Management</p>
              <p style="font-size: 16px; margin: 0; color: #f0f0f0;"><em>Click "Settings" on the home page or in the sidebar navigation.</em></p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>🎯 Goal</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Choose your goal: <strong>weight loss</strong> ⬇️, <strong>weight maintenance</strong> ⚖️, or <strong>weight gain</strong> 💪. This determines your daily calorie and macronutrient targets.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>👤 Gender</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Specify your gender for a more accurate calculation of your basal metabolic rate. You can select <strong>"Prefer not to say"</strong>.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>🏃 Activity Level</strong></p>
              <div style="border-left: 3px solid #667eea; padding-left: 15px; margin-bottom: 15px;">
                <p style="font-size: 15px; margin: 0 0 12px 0; font-weight: bold;">How would you like to specify your activity?</p>
                <div style="margin-left: 10px; border-left: 2px solid rgba(102, 126, 234, 0.6); padding-left: 12px; margin-bottom: 10px;">
                    <p style="font-size: 14px; margin: 0; line-height: 1.5;">✍️ <strong>Describe your lifestyle</strong> — describe your daily routine in your own words (e.g., "night shift work, 2 hours of walking daily"), and the AI assistant will automatically calculate your activity coefficient.</p>
                </div>
                <div style="margin-left: 10px; border-left: 2px solid rgba(102, 126, 234, 0.6); padding-left: 12px;">
                    <p style="font-size: 14px; margin: 0; line-height: 1.5;">📋 <strong>Choose from presets</strong> — select the most suitable activity level from the list (sedentary, light activity, moderate, etc.).</p>
                </div>
              </div>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>🎂 Age</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Enter your age in years. Metabolism changes over time, so this is important for accurate calorie calculations.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>⚖️ Weight</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Your current weight in kilograms. Update this value regularly to track progress and ensure accurate targets.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong>📏 Height</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">Your height in centimeters. Used together with your weight and age to calculate BMI and daily calorie needs.</p>
            </div>
            <div style="background: rgba(102, 126, 234, 0.08); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(102, 126, 234, 0.2);">
              <p style="font-size: 16px; margin-bottom: 10px;"><strong> Apply Changes</strong></p>
              <p style="font-size: 15px; margin: 0; padding-left: 10px; border-left: 3px solid #667eea;">After adjusting your parameters, click <strong>"Apply"</strong> to save the new settings and automatically recalculate your calorie and macronutrient targets.</p>
            </div>
            <div style="background: rgba(76, 175, 80, 0.1); padding: 20px; border-radius: 10px; border-left: 4px solid #4CAF50; text-align: center;">
              <p style="font-size: 15px; margin: 0;"><em> Update your weight regularly for accurate progress tracking!</em></p>
            </div>
          </div>
  description: "*You can always reopen this help from the sidebar.*"

