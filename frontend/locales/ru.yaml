# === AUTH ===
login:
  title: "Вход"
  username: "Имя пользователя"
  password: "Пароль"
  sign_in_btn: "Войти"
  sign_up_btn: "Регистрация"

register:
  title: "Регистрация"
  gender: 
    label: "Какой у вас пол?"
    options:
      - ":blue[Мужской]"
      - ":red[Женский]"
      - "Не указывать"
  age: 
    label: "Сколько вам лет?"
    placeholder: "Введите возраст..."
  lifestyle:
    label: "Какой образ жизни вы ведёте?"
    options:
      - "Сидячий образ жизни"
      - "Лёгкие тренировки 1-2 раза в неделю"
      - "Тренировки 3-5 раз в неделю"
      - "Ежедневные интенсивные тренировки"
      - "Тяжёлая физическая работа"
  weight:
    label: "Сколько вы весите?"
    placeholder: "Введите вес..."
  height:
    label: "Какой у вас рост в см?"
    placeholder: "Введите рост..."
  username:
    label: "Имя пользователя"
    placeholder: "Введите имя пользователя..."
    pattern: "
      \n\n• Минимальная длина: 3 символа
      \n\n• Максимальная длина: 20 символов
      \n\n• Без пробелов в начале и конце
      \n\n• Регистр не важен (сохраняется в нижнем)"
  password:
    label: "Пароль"
    placeholder: "Введите пароль..."
    pattern: "
      \n\n• Минимальная длина: 6 символов
      \n\n• Минимум 3 цифры
      \n\n• Минимум одна заглавная и одна строчная буква
      \n\n• Минимум один спецсимвол (#, !, $, ^, *, @)"
  re_password:
    label: "Повторите пароль"
    placeholder: "Повторите пароль..."
  sign_up_btn: "Зарегистрироваться"
  back_btn: "Назад"

