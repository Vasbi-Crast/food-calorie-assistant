    calories_kcal: "Калории (ккал)"
    proteins_g: "Белки (г.)"
    fats_g: "Жиры (г.)"
    carbs_g: "Углеводы (г.)"
  
  recognition:
    ingredients: "Ингредиенты"
    total: "Всего нутриентов"
  
  home:
