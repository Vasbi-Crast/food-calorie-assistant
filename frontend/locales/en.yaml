# === WARNINGS & INFO ===
warning:
  recognition:
    parse_failed: "⚠️ Failed to parse nutrition data."
    no_data: "⚠️ Nutritional information not available for this image."
  stats:
    no_data: "⚠️ No statistics data available. Please select a date range."

info:
  stats:
    no_nutrition: "📋 No nutrition data available for selected period"

# === UI PATTERNS ===
ui:
  username:
    pattern: |
      • Minimum length: 3 characters
      • Maximum length: 20 characters
      • No leading or trailing spaces
      • Case-insensitive (stored as lowercase)
  password:
    pattern: |
      • Minimum length: 6 characters
      • At least 3 digits
      • At least one uppercase and one lowercase letter
      • At least one special character (#, !, $, ^, *, @)
  
  # === UI: TABLES ===
  table:
    ingredient: "Ingredient"
    weight_g: "Weight (g)"
    calories_kcal: "Calories (kcal)"
    proteins_g: "Proteins (g)"
    fats_g: "Fats (g)"
    carbs_g: "Carbohydrates (g)"
    match: "Match"
    total: "📊 Total"
    saved_success: "✅ Changes saved successfully!"
  
  metric:
    weight_g: "Weight (g.)"
    calories_kcal: "Calories (kcal)"
    proteins_g: "Proteins (g.)"
    fats_g: "Fats (g.)"
    carbs_g: "Carbs (g.)"
  
  recognition:
    ingredients: "Ingredients"
    total: "Total nutrition"
  
  home:
    today_info: "Information of the day"
  
  unit:
    g: "g."
    kcal: "kcal"
  
  chart:
    no_data: "No data"

