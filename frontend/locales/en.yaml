# === AUTH ===
login:
  title: "Login"
  username: "Username"
  password: "Password"
  sign_in_btn: "Sign in"
  sign_up_btn: "Sign up"

register:
  title: "Registration"
  gender: 
    label: "What gender are you?"
    options:
      - ":blue[Man]"
      - ":red[Woman]"
      - "Don't specify"
  age: 
    label: "How old are you?"
    placeholder: "Type a age..."
  lifestyle:
    label: "What kind of lifestyle do you lead?"
    options:
      - "Sedentary lifestyle"
      - "Light training 1-2 times a week"
      - "3-5 training sessions per week"
      - "Daily intensive training"
      - "Heavy physical labor"
  weight:
    label: "How much weight do you have?"
    placeholder: "Type a weight..."
  height:
    label: "How tall are you in cm?"
    placeholder: "Type a height..."
  username:
    label: "Username"
    placeholder: "Type a username..."
    pattern: "
      \n\n• Minimum length: 3 characters
      \n\n• Maximum length: 20 characters
      \n\n• No leading or trailing spaces
      \n\n• Case-insensitive (stored as lowercase)"
  password:
    label: "Password"
    placeholder: "Type a password..."
    pattern: "
      \n\n• Minimum length: 6 characters
      \n\n• At least 3 digits
      \n\n• At least one uppercase and one lowercase letter
      \n\n• At least one special character (#, !, $, ^, *, @)"
  re_password:
    label: "Repeat the password"
    placeholder: "Type a re-password..."
  sign_up_btn: "Sign up"
  back_btn: "Back"

