    generic: "❌ Request failed: {error}"
  
  http:
    400: "⚠️ Bad Request"
    401: "🔐 Authorization Failed"
    403: "🚫 Access Denied"
    404: "📍 Not Found"
    422: "📝 Validation Error"
    500: "💥 Internal Server Error"
    504: "⏳ Gateway Timeout"
  
  auth:
    user_not_found: "🔐 The user does not exist. Please register."
    invalid_password: "🔐 Incorrect password. Try again."
  
  session:
    inactive: "⏳ You've been inactive for too long"
  
  validation:
    missing: "This field is required"
    string_too_short: "Value is too short (min {num_char} characters for {field})"
    string_too_long: "Value is too long (max {num_char} characters for {field})"
    greater_than_equal: "Value must be >= minimum allowed for {field}"
    less_than_equal: "Value must be <= maximum allowed for {field}"
    greater_than: "Value must be > minimum allowed for {field}"
    less_than: "Value must be < maximum allowed for {field}"
    value_error:
      password: "Incorrect form {field}.\nRules:\n{form_pattern}"
    int_parsing: "Must be an integer number"
    float_parsing: "Must be a decimal number"
    date_parsing: "Invalid date format (YYYY-MM-DD)"
    generic: "Invalid value provided"
  
  form:
    username_required: "⚠️ Username is required."
    password_required: "⚠️ Password is required."
    passwords_mismatch: "⚠️ Passwords do not match."
  
  dish:
